name: Deploy Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web-*/**"
      - "packages/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build affected web apps
        run: pnpm turbo run build --filter='./apps/web-*'

      - name: Deploy note
        run: echo "Configure Vercel project per app with Root Directory apps/web-{slug}"
